<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eddie | Personal Page</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="hero-card">
      <div class="hero-top">
        <p class="tag">Eddie's Personal Page</p>
        <div class="badge-row">
          <span>AI learner</span>
          <span>Beginner coder</span>
          <span>Leveling up</span>
        </div>
      </div>

      <h1>Hi, I'm Eddie.</h1>
      <p class="intro">
        I'm 17, learning coding from zero, building real skills step by step, and trying to become sharper,
        stronger, and more disciplined over time.
      </p>

      <div class="tab-row">
        <button class="tab-button active" data-tab="about" type="button">About Me</button>
        <button class="tab-button" data-tab="building" type="button">What I'm Building</button>
        <button class="tab-button" data-tab="mindset" type="button">My Mindset</button>
      </div>

      <section class="content-panel">
        <h2 id="panelTitle">About Me</h2>
        <p id="panelText"></p>
        <ul id="panelList" class="panel-list"></ul>
      </section>

      <footer class="footer-note">One step at a time. Still counts.</footer>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
